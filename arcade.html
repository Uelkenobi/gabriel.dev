<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcade · Uelkenobi</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Fira+Code:wght@400;600&family=Special+Elite&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        /* MODO FOCO TOTAL */
        body.game-active, body.game-active * { cursor: default !important; }
        body.game-active canvas, body.game-active .canvas-container, body.game-active #startOverlay { cursor: none !important; touch-action: none; }
        body.game-active .collage-item:hover { transform: none !important; box-shadow: var(--shadow) !important; border-color: rgba(0,0,0,0.1) !important; }
        body.game-active .glitch::before, body.game-active .glitch::after { animation: none !important; opacity: 0 !important; }
        body.game-active #startOverlay *, body.game-active #saveScoreDiv *, body.game-active .game-menu * { cursor: crosshair !important; }

        .arcade-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
            align-items: start;
        }
        
        .canvas-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1/1;
            margin: 0 auto;
            overflow: hidden;
            border: 2px solid var(--acc-color);
            background-color: #050505;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            box-sizing: border-box;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #startOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #startBtn {
            font-size: 1.5rem;
            padding: 15px 30px;
            background: #000;
            box-shadow: 0 0 15px var(--acc-color);
        }

        .game-menu { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap;}
        .game-btn { font-size: 0.9rem; padding: 8px 15px; }
        .game-btn.active { background-color: var(--acc-color); color: var(--bg-color); box-shadow: 0 0 10px var(--acc-color);}

        .leaderboard-card { padding: 15px !important; }
        .score-list { list-style: none; margin-left: 0; padding: 0; margin-top: 15px;}
        .score-list li { 
            display: flex; justify-content: space-between; 
            border-bottom: 1px dashed rgba(0, 255, 65, 0.3); 
            padding: 5px 0; font-size: 0.9rem;
        }
        .nick-input-group { display: flex; gap: 5px; margin-top: 15px;}
        .nick-input-group input { flex-grow: 1; padding: 5px; background: #000; border: 1px solid var(--acc-color); color: var(--acc-color); font-family: var(--font-mono); text-transform: uppercase;}
        
        @media (max-width: 768px) {
            .arcade-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="noise-bg" data-theme="dark">

    <div class="scanlines"></div>

    <header class="header collage-item">
        <div class="container header-content">
            <a href="index.html" class="logo glitch" data-text="< voltar">< voltar</a>
            <nav class="nav">
                <span class="nav-link special-elite highlight">[ SERVIDOR DE LAZER ]</span>
            </nav>
        </div>
    </header>

    <main class="container" style="padding-bottom: 50px;">
        
        <section class="collage-item cut-paper" style="text-align: center; margin-top: 20px; margin-bottom: 20px;">
            <h1 class="main-title" style="font-size: 2rem; margin-bottom: 5px;">sys_arcade<span class="highlight">.exe</span></h1>
            
            <div class="game-menu fira-code">
                <button class="btn btn-outline game-btn active" onclick="changeGame('snake')">[ Cobrinha ]</button>
                <button class="btn btn-outline game-btn" onclick="changeGame('dino')">[ T-Rex_Off ]</button>
                <button class="btn btn-outline game-btn" onclick="changeGame('pong')">[ DDoS_Pong ]</button>
            </div>
        </section>

        <div class="arcade-layout">
            <section class="collage-item terminal-card">
                <div class="terminal-header" id="gameTitle">executando: script_cobrinha.py</div>
                <div style="padding: 20px; text-align: center;">
                    
                    <div class="canvas-container">
                        <canvas id="gameCanvas" width="400" height="400"></canvas>
                        
                        <div id="startOverlay">
                            <button id="startBtn" class="btn-terminal">[ INICIAR ]</button>
                        </div>
                    </div>

                    <p class="fira-code" style="margin-top: 15px; font-size: 1.2rem; color: var(--acc-color);">
                        SCORE ATUAL: <span id="currentScore">0</span>
                    </p>
                    <div id="controlsText" class="fira-code faint-text" style="margin-top: 10px; font-size: 0.8rem; line-height: 1.5;">
                        [ SETAS / DESLIZE O DEDO ] Direção<br>[ ESPAÇO ] Pausar
                    </div>
                </div>
            </section>

            <section class="collage-item terminal-card leaderboard-card">
                <div class="terminal-header">hall_of_fame.db</div>
                <div style="padding: 10px;">
                    <h3 class="special-elite" style="color: var(--acc-hover); margin-bottom: 10px;">Top Hackers - <span id="rankTitle">Cobrinha</span></h3>
                    
                    <ul class="score-list fira-code" id="scoreList"></ul>

                    <div id="saveScoreDiv" style="display: none; margin-top: 20px; border-top: 1px dashed #333; padding-top: 15px;">
                        <p class="fira-code" style="font-size: 0.8rem; color: var(--acc-color);">Novo Recorde! Salve seu Nick:</p>
                        <div class="nick-input-group">
                            <input type="text" id="playerNick" maxlength="3" placeholder="Ex: UEL">
                            <button class="btn-terminal" onclick="saveScore()" style="padding: 5px;">[SALVAR]</button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer collage-item torn-paper">
        <p class="special-elite">© <span id="year"></span> Uelkenobi Tech Industries. Lazer Mobile Support.</p>
    </footer>

    <svg width="0" height="0">
        <filter id="torn">
            <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" stitchTiles="stitch"/>
            <feDisplacementMap in="SourceGraphic" scale="15"/>
        </filter>
    </svg>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        // Variáveis Globais
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('currentScore');
        
        let currentGame = 'snake';
        let gameState = 'waiting'; 
        let gameLoop;
        let score = 0;
        let frames = 0;

        const colorAcc = '#00ff41'; 
        const colorHover = '#ff0055'; 

        // --- SISTEMA DE LEADERBOARD ---
        let finalScoreToSave = 0;

        function getDB() {
            let db = JSON.parse(localStorage.getItem('uelkenobi_arcade')) || {};
            if(!db.snake) db.snake = []; if(!db.dino) db.dino = []; if(!db.pong) db.pong = [];
            return db;
        }

        function loadLeaderboard() {
            let db = getDB();
            const list = document.getElementById('scoreList');
            list.innerHTML = '';
            let scores = db[currentGame];
            if (scores.length === 0) { list.innerHTML = '<li class="faint-text">Banco vazio.</li>'; return; }
            scores.forEach((entry, i) => { list.innerHTML += `<li><span>#${i+1} ${entry.nick}</span> <span>${entry.score} pts</span></li>`; });
        }

        function checkHighScore() {
            let db = getDB();
            let scores = db[currentGame];
            if (score > 0 && (scores.length < 5 || score > scores[scores.length - 1].score)) {
                finalScoreToSave = score;
                document.getElementById('saveScoreDiv').style.display = 'block';
                document.getElementById('playerNick').focus();
            }
        }

        function saveScore() {
            let nick = document.getElementById('playerNick').value.toUpperCase() || 'ANM';
            let db = getDB();
            db[currentGame].push({ nick: nick, score: finalScoreToSave });
            db[currentGame].sort((a, b) => b.score - a.score);
            db[currentGame] = db[currentGame].slice(0, 5); 
            localStorage.setItem('uelkenobi_arcade', JSON.stringify(db));
            document.getElementById('saveScoreDiv').style.display = 'none';
            document.getElementById('playerNick').value = '';
            loadLeaderboard();
        }

        function lockPage() { document.body.classList.add('game-active'); }
        function unlockPage() { document.body.classList.remove('game-active'); }

        document.getElementById('startBtn').addEventListener('click', () => {
            document.getElementById('startOverlay').style.display = 'none';
            document.getElementById('startBtn').blur(); 
            lockPage(); 
            startGame();
        });

        function changeGame(game) {
            currentGame = game;
            gameState = 'waiting';
            cancelAnimationFrame(gameLoop);
            scoreElement.textContent = '0';
            unlockPage();

            document.getElementById('startOverlay').style.display = 'flex';
            document.getElementById('startBtn').textContent = '[ INICIAR ]';
            document.getElementById('saveScoreDiv').style.display = 'none';

            document.querySelectorAll('.game-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const titles = {
                'snake': { title: 'executando: script_cobrinha.py', rank: 'Cobrinha', ctrl: '[ SETAS / DESLIZE ] Direção<br>[ ESPAÇO ] Pausar' },
                'dino': { title: 'executando: t-rex_offline.exe', rank: 'T-Rex Runner', ctrl: '[ TOQUE / MOUSE / ESPAÇO ] Pular' },
                'pong': { title: 'executando: ddos_deflect.sh', rank: 'DDoS Deflect', ctrl: '[ DESLIZE / MOUSE ] Mover<br>Rebata os pacotes!' }
            };
            
            document.getElementById('gameTitle').textContent = titles[game].title;
            document.getElementById('rankTitle').textContent = titles[game].rank;
            document.getElementById('controlsText').innerHTML = titles[game].ctrl;

            drawCanvas(); 
            loadLeaderboard();
        }

        function startGame() {
            gameState = 'playing';
            score = 0;
            scoreElement.textContent = '0';
            document.getElementById('saveScoreDiv').style.display = 'none';
            
            if(currentGame === 'snake') initSnake();
            if(currentGame === 'dino') initDino();
            if(currentGame === 'pong') initPong();
        }

        // --- 1. SNAKE ---
        let snake, food, dx, dy, changingDirection;
        function initSnake() {
            snake = [{x: 200, y: 200}, {x: 180, y: 200}];
            dx = 20; dy = 0; changingDirection = false;
            spawnFood(); frames = 0;
            gameLoop = requestAnimationFrame(updateSnake);
        }
        function spawnFood() {
            food = { x: Math.floor(Math.random() * 20) * 20, y: Math.floor(Math.random() * 20) * 20 };
        }
        function updateSnake() {
            if (gameState !== 'playing') return;
            frames++;
            if (frames < 12) { gameLoop = requestAnimationFrame(updateSnake); return; } 
            frames = 0;
            changingDirection = false; 

            let head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10; scoreElement.textContent = score; spawnFood();
            } else { snake.pop(); }

            if (head.x < 0 || head.x >= 400 || head.y < 0 || head.y >= 400) triggerGameOver();
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) triggerGameOver();
            }

            drawCanvas();
            ctx.fillStyle = colorHover; ctx.fillRect(food.x, food.y, 20, 20); 
            ctx.fillStyle = colorAcc; snake.forEach(p => { ctx.fillRect(p.x, p.y, 19, 19); }); 
            if(gameState === 'playing') gameLoop = requestAnimationFrame(updateSnake);
        }

        // --- 2. DINO (MODO RELAX) ---
        let dino, obstacles; const groundY = 320;
        function initDino() {
            // Gravidade e pulo ajustados para ser mais flutuante
            dino = {x: 40, y: groundY - 40, w: 20, h: 40, vy: 0, jump: -10, gravity: 0.6, grounded: true};
            obstacles = []; frames = 0;
            gameLoop = requestAnimationFrame(updateDino);
        }
        function updateDino() {
            if (gameState !== 'playing') return;
            frames++;
            dino.vy += dino.gravity; dino.y += dino.vy;
            if (dino.y + dino.h >= groundY) { dino.y = groundY - dino.h; dino.vy = 0; dino.grounded = true; }

            // Spawna menos frequentemente (de 80 para 120)
            if (frames % 120 === 0) {
                let obsHeight = Math.random() > 0.5 ? 20 : 40; 
                obstacles.push({x: 400, y: groundY - obsHeight, w: 20, h: obsHeight, passed: false});
            }
            drawCanvas();
            ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(400, groundY);
            ctx.strokeStyle = '#333'; ctx.lineWidth = 2; ctx.stroke();
            ctx.fillStyle = colorAcc; ctx.fillRect(dino.x, dino.y, dino.w, dino.h);
            ctx.fillStyle = colorHover;
            obstacles.forEach(obs => {
                // Obstáculo bem mais lento (de 4 para 2.5)
                obs.x -= 2.5; 
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                if (dino.x < obs.x + obs.w && dino.x + dino.w > obs.x && dino.y < obs.y + obs.h && dino.y + dino.h > obs.y) triggerGameOver();
                if (obs.x + obs.w < dino.x && !obs.passed) { obs.passed = true; score += 10; scoreElement.textContent = score; }
            });
            if (obstacles.length > 0 && obstacles[0].x < -50) obstacles.shift();
            if(gameState === 'playing') gameLoop = requestAnimationFrame(updateDino);
        }

        // --- 3. PONG (MODO RELAX) ---
        let ball, player, ai;
        function initPong() {
            // Bola e AI muito mais lentas
            ball = {x: 200, y: 200, vx: 2.5, vy: 2.5, size: 10};
            player = {y: 150, width: 10, height: 80};
            ai = {y: 150, width: 10, height: 80, vy: 2.2}; 
            gameLoop = requestAnimationFrame(updatePong);
        }
        function updatePong() {
            if (gameState !== 'playing') return;
            ball.x += ball.vx; ball.y += ball.vy;

            let targetY = ball.y - ai.height/2;
            if (ai.y < targetY - 5) ai.y += ai.vy;
            if (ai.y > targetY + 5) ai.y -= ai.vy;
            if (ai.y < 0) ai.y = 0; if (ai.y > 400 - ai.height) ai.y = 400 - ai.height;

            if (ball.y < 0 || ball.y + ball.size > 400) ball.vy *= -1;

            if (ball.x < 20 && ball.y > player.y && ball.y < player.y + player.height) {
                // Aceleração quase imperceptível (de -1.05 para -1.02)
                ball.vx *= -1.02; ball.x = 20; score += 15; scoreElement.textContent = score;
            }
            if (ball.x + ball.size > 380 && ball.y > ai.y && ball.y < ai.y + ai.height) {
                ball.vx *= -1; ball.x = 380 - ball.size;
            }
            if (ball.x < 0) triggerGameOver();

            drawCanvas();
            ctx.fillStyle = colorAcc; ctx.fillRect(10, player.y, player.width, player.height);
            ctx.fillStyle = '#333'; ctx.fillRect(380, ai.y, ai.width, ai.height);
            ctx.fillStyle = colorHover; ctx.fillRect(ball.x, ball.y, ball.size, ball.size);
            
            ctx.beginPath(); ctx.setLineDash([5, 15]); ctx.moveTo(200, 0); ctx.lineTo(200, 400);
            ctx.strokeStyle = '#333'; ctx.stroke(); ctx.setLineDash([]);
            if(gameState === 'playing') gameLoop = requestAnimationFrame(updatePong);
        }

        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function triggerGameOver() {
            gameState = 'gameover'; unlockPage();
            ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = colorHover; ctx.font = 'bold 30px "Fira Code"'; ctx.textAlign = 'center'; ctx.fillText('FATAL ERROR', 200, 150);
            
            const overlay = document.getElementById('startOverlay');
            overlay.style.display = 'flex';
            document.getElementById('startBtn').textContent = '[ REINICIAR ]';
            checkHighScore();
        }

        // --- INPUTS: TECLADO ---
        document.addEventListener('keydown', (e) => {
            if(['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code) && document.activeElement.id !== 'playerNick') e.preventDefault(); 
            
            if (currentGame === 'dino' && gameState === 'playing' && (e.code === 'Space' || e.code === 'ArrowUp') && dino.grounded) {
                dino.vy = dino.jump; dino.grounded = false;
            }

            if (e.code === 'Space' && document.activeElement.id !== 'playerNick') {
                if (gameState === 'playing' && currentGame === 'snake') {
                    gameState = 'paused'; unlockPage();
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = colorAcc; ctx.font = '20px "Fira Code"'; ctx.textAlign = 'center'; ctx.fillText('PAUSADO', 200, 200);
                } else if (gameState === 'paused') { gameState = 'playing'; lockPage(); if(currentGame === 'snake') updateSnake(); }
            }

            if (currentGame === 'snake' && gameState === 'playing' && !changingDirection) {
                const goingUp = dy === -20, goingDown = dy === 20, goingRight = dx === 20, goingLeft = dx === -20;
                if (e.code === 'ArrowLeft' && !goingRight) { dx = -20; dy = 0; changingDirection = true; }
                if (e.code === 'ArrowUp' && !goingDown) { dx = 0; dy = -20; changingDirection = true;}
                if (e.code === 'ArrowRight' && !goingLeft) { dx = 20; dy = 0; changingDirection = true;}
                if (e.code === 'ArrowDown' && !goingUp) { dx = 0; dy = 20; changingDirection = true;}
            }
        });

        // --- INPUTS: MOUSE E TOUCH ---
        function movePaddle(clientY) {
            if(currentGame !== 'pong' || gameState !== 'playing') return;
            const rect = canvas.getBoundingClientRect();
            const scaleY = canvas.height / rect.height; 
            player.y = (clientY - rect.top) * scaleY - player.height / 2;
            if (player.y < 0) player.y = 0;
            if (player.y > 400 - player.height) player.y = 400 - player.height;
        }

        canvas.addEventListener('mousemove', (e) => { movePaddle(e.clientY); });
        
        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 0 && currentGame === 'dino' && gameState === 'playing' && dino.grounded) {
                dino.vy = dino.jump; dino.grounded = false;
            }
        });

        let touchStartX = 0; let touchStartY = 0;
        
        canvas.addEventListener('touchstart', (e) => {
            if(gameState !== 'playing') return;
            touchStartX = e.changedTouches[0].screenX; touchStartY = e.changedTouches[0].screenY;
            if (currentGame === 'dino' && dino.grounded) { dino.vy = dino.jump; dino.grounded = false; e.preventDefault(); }
        }, {passive: false});

        canvas.addEventListener('touchmove', (e) => {
            if(gameState !== 'playing') return;
            e.preventDefault(); 
            if(currentGame === 'pong') movePaddle(e.touches[0].clientY);
        }, {passive: false});

        canvas.addEventListener('touchend', (e) => {
            if(currentGame !== 'snake' || gameState !== 'playing' || changingDirection) return;
            let touchEndX = e.changedTouches[0].screenX; let touchEndY = e.changedTouches[0].screenY;
            let dxTouch = touchEndX - touchStartX; let dyTouch = touchEndY - touchStartY;
            
            if(Math.abs(dxTouch) > Math.abs(dyTouch)) { 
                if(dxTouch > 30 && dx !== -20) { dx = 20; dy = 0; changingDirection = true; }
                else if(dxTouch < -30 && dx !== 20) { dx = -20; dy = 0; changingDirection = true; }
            } else { 
                if(dyTouch > 30 && dy !== -20) { dx = 0; dy = 20; changingDirection = true; }
                else if(dyTouch < -30 && dy !== 20) { dx = 0; dy = -20; changingDirection = true; }
            }
        });

        drawCanvas(); loadLeaderboard();
    </script>
</body>
</html>
